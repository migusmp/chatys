<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>

<body>
    <div class="userdata-container" id="profile-container">
        <div class="profile-picture-wrapper">
            <input type="file" id="file-input" accept="image/*" style="display: none;" />
            <img src="https://via.placeholder.com/140" alt="Foto de perfil" id="profile-picture" />
            <div class="edit-icon" title="Cambiar foto">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil-fill" viewBox="0 0 16 16">
                <path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/>
              </svg></div>
        </div>
        <div id="upload-success" class="upload-success hidden">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#00ff6a" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
          </svg>
          <span id="upload-message"></span>
        </div> <!-- Mensaje de imagen actualizada -->
      
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" value="Juan Pérez" />
        </div>
      
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" value="juanp" />
        </div>
      
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" value="juan@example.com" />
        </div>
      
        <div class="form-group">
          <label for="joined">Fecha de unión</label>
          <input type="text" id="joined" value="2023-06-02" disabled />
        </div>

        <div id="save-new-data-msg" class="save-new-data-msg hidden"></div>
        
        <div class="buttons-profile">
            <button id="save-profile">Guardar cambios</button>
            <button id="delete-profile">Eliminar cuenta</button>
        </div>
        
      </div>

      <div id="delete-modal" class="modal hidden">
        <div class="modal-content">
          <p>¿Estás seguro de que quieres eliminar tu cuenta?</p>
          <div class="modal-buttons">
            <button id="confirm-delete">Sí, eliminar</button>
            <button id="cancel-delete">Cancelar</button>
          </div>
        </div>
      </div>
</body>

</html>
