<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DM</title>
  <style>
    /* Reset */
    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
      overflow: hidden; /* para evitar scroll en body */
    }

    #dm-layout {
      display: flex;
      height: 100vh; /* toda la altura de la ventana */
      width: 100vw;
    }

    #sidebar {
      width: 250px;
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      overflow-y: auto;
      height: 100vh; /* toda la altura */
      position: fixed; /* fija el sidebar */
      top: 0;
      left: 0;
    }

    #sidebar h2 {
      margin-top: 0;
    }

    #sidebar .friend {
      margin: 10px 0;
      cursor: pointer;
    }

    #sidebar .friend:hover {
      text-decoration: underline;
    }

    #chat-container {
      margin-left: 250px; /* para que no quede debajo del sidebar */
      flex: 1;
      padding: 20px;
      height: 100vh;
      overflow-y: auto;
      background: red;
    }
  </style>
</head>
<body>
  <!-- En dm.html -->
<div id="dm-layout">
    <div id="sidebar">
      <!-- Lista de amigos -->
    </div>
    <div id="chat-container">
      <!-- Aquí se cargará el chat -->
    </div>
  </div>
</body>
</html>
