<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Amigos de {{ username }}</title>
</head>
<body>
    <h1>Amigos de {{ username }}</h1>
    <ul>
        {% for friend in friends %}
            <li>
                {{ friend.username }} - {{ friend.status }}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
